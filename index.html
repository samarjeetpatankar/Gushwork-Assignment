<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gushwork</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div>
      <div>
        <nav class="navbar">
          <div class="container">
            <div class="nav-left">
              <img src="./images/main_logo.png" class="logo" />
            </div>
            <div class="nav-right">
              <p class="nav-link">About Us</p>
              <p class="nav-link">
                Products <img src="./images/drop_down.png" class="drop-down" />
              </p>
              <button>Contact Us</button>
            </div>
          </div>
        </nav>
      </div>

      <div class="hero-section">
        <div class="hero-content">
          <div>
            <div>
              <p class="hero-subtitle">
                <span class="breadcrumb">Products</span>
                <span class="separator">></span>
                <span class="current">Two For One Twister</span>
              </p>
            </div>
            <div class="hero-second">
              <div class="hero-second-left">
                <img
                  src="./images/hero_second_left.png"
                  class="hero-second-left-image"
                />
                <div class="hero-second-left-bottom-white-image">
                  <img src="./images/hero_second_left_bottom_white.png" />
                  <img src="./images/hero_second_left_bottom_white.png" />
                  <img src="./images/hero_second_left_bottom_white.png" />
                  <img src="./images/hero_second_left_bottom_white.png" />
                  <img src="./images/hero_second_left_bottom_white.png" />
                  <img src="./images/hero_second_left_bottom_white.png" />
                  <img src="./images/hero_second_left_bottom_white.png" />
                </div>
              </div>
              <div class="hero-second-right">
                <div class="hero-second-right-certified">
                  <div class="main-certified">
                    <img src="./images/bis_certified.png" />
                    <p>BIS Certified</p>
                  </div>

                  <div class="main-certified">
                    <img src="./images/isi_certified.png" />
                    <p>ISO Certified</p>
                  </div>

                  <div class="main-certified">
                    <img src="./images/ce_certified.png" />
                    <p>CE Certified</p>
                  </div>
                </div>

                <div class="hero-second-right-heading">
                  <h1>Premium HDPE Pipes & Coils for Modern Infrastructure</h1>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
